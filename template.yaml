AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

# =============================================================================
# Gerchik-Perchik — disciplined technical-analysis trading-signal bot.
#
#   "Math decides. AI only explains."
#
# Phase 3 scope (this file): the four data tables (all Retain) + the scanner
# Lambda skeleton + its schedule and IAM. NO alerts, NO narration, NO go-live.
# Tables carry Retain policies because the accumulated history and the tuned
# config ARE the project — they must survive a table replacement or stack delete.
#
# Build order reminder (see CLAUDE.md):
#   3 (here)  tables + scanner skeleton; seed config + watchlist; sam validate
#   4         scanner writes snapshots + opens outcome rows; NO alerts
#   5         labeler; 6 telegram + narration; 7 control; 8 tune; 9 human go-live
# =============================================================================

Description: >
  Gerchik-Perchik technical-analysis signal bot — Phase 3: data tables (Retain)
  and scanner skeleton. Deterministic scoring decides; the LLM (Phase 6) only
  narrates a locked payload.

# -----------------------------------------------------------------------------
# Parameters — externalised so paths/schedule can change without touching code.
# -----------------------------------------------------------------------------
Parameters:
  # API keys are REUSED from the account-level Edge Hunter params (see CLAUDE.md).
  # We pass the SSM *paths* here; the Lambda reads + decrypts the values at
  # runtime. The values themselves never enter the template, code, or logs.
  TiingoKeyPath:
    Type: String
    Default: /edge-hunter/tiingo/api_key
    Description: SSM path to the Tiingo API key (EOD history).
  FinnhubKeyPath:
    Type: String
    Default: /edge-hunter/finnhub/api_key
    Description: SSM path to the Finnhub API key (earnings, sector).

  # Phase 6: narration + Telegram. Bot token + Anthropic key are reused from
  # Edge Hunter; the chat id is a NEW dedicated-channel param created by a human
  # (see docs/alerts.md) — the stack only references it by path for IAM scoping.
  AnthropicKeyPath:
    Type: String
    Default: /edge-hunter/anthropic/api_key
    Description: SSM path to the Anthropic API key (narration).
  TelegramBotTokenPath:
    Type: String
    Default: /edge-hunter/telegram/bot_token
    Description: SSM path to the reused Telegram bot token.
  TelegramChatIdPath:
    Type: String
    Default: /gerchik/telegram/chat_id
    Description: SSM path to the DEDICATED Gerchik-Perchik Telegram chat id.

  # Daily scan time, in UTC. The US cash close is 16:00 ET and Tiingo EOD data
  # settles ~18:00 ET, so we scan well after that. NOTE: this is a fixed UTC
  # cron — it does NOT auto-adjust for US daylight-saving. 22:30 UTC is ~18:30 ET
  # (EDT) / ~17:30 ET (EST); revisit if the close-to-scan gap ever matters.
  # On/off is controlled at RUNTIME by the control Lambda toggling this rule
  # (Phase 7), never by redeploying with a different value.
  ScanScheduleExpression:
    Type: String
    Default: cron(30 22 ? * MON-FRI *)
    Description: UTC cron for the post-close daily scan.

  LabelScheduleExpression:
    Type: String
    Default: cron(0 23 ? * MON-FRI *)
    Description: UTC cron for the daily outcome-labeling pass (after the scan).

  # Deploy-time baseline for the scan schedule. Defaults OFF so deploys never
  # silently start the scanner before the pipeline is ready (no snapshots until
  # Phase 4, no alerts until Phase 6). Set to 'true' (or override at deploy) when
  # the system is ready to run. NOTE: this is the baseline CloudFormation applies
  # on each deploy; the Phase 7 control Lambda toggles the rule at runtime WITHIN
  # a deploy cycle, but a redeploy resets it to this value.
  ScheduleEnabled:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Whether the scanner schedule rule is enabled at deploy time.

Conditions:
  ScheduleIsEnabled: !Equals [!Ref ScheduleEnabled, 'true']

# -----------------------------------------------------------------------------
# Globals — defaults inherited by every function.
# -----------------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs22.x          # matches the codebase (Node 22 ESM)
    Handler: handler.handler     # every function exports `handler` from handler.mjs
    Architectures:
      - arm64                    # cheaper/faster; SDK + our pure JS are arch-agnostic
    MemorySize: 512
    Timeout: 120                 # a full watchlist scan makes many feed calls
    Tags:
      Project: gerchik-perchik   # required on every resource
    Environment:
      Variables:
        # Table names are injected so code never hardcodes them.
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        OUTCOMES_TABLE: !Ref OutcomesTable
        CONFIG_TABLE: !Ref ConfigTable
        WATCHLIST_TABLE: !Ref WatchlistTable
        # SSM paths (references only — never the secret values).
        TIINGO_KEY_PATH: !Ref TiingoKeyPath
        FINNHUB_KEY_PATH: !Ref FinnhubKeyPath

Resources:
  # ===========================================================================
  # Data tables. PAY_PER_REQUEST (spiky daily workload, no capacity planning).
  # DeletionPolicy + UpdateReplacePolicy = Retain on ALL of them: the history and
  # tuned config must outlive any table replacement or stack delete.
  # ===========================================================================

  # Every name scored gets a daily snapshot row.
  # pk = TICKER#<ticker> (S), sk = <epoch day> (N). No TTL — history is the point.
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: gp-snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: N
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: gerchik-perchik

  # One row per opened signal; the labeler fills the outcome later.
  # pk = SIGNAL#<ticker>#<entryDate> (S), sk = <entry epoch> (N).
  OutcomesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: gp-outcomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: N
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: gerchik-perchik

  # Exactly one live tunables row: pk = "CONFIG" (S), sk = "ACTIVE" (S).
  # Read at the start of every run; never hardcoded in the Lambdas.
  ConfigTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: gp-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: gerchik-perchik

  # The universe to scan: pk = TICKER#<ticker> (S). Scanner only reads enabled rows.
  # `sector` feeds the correlation gate.
  WatchlistTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: gp-watchlist
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: Project
          Value: gerchik-perchik

  # ===========================================================================
  # Scanner Lambda (skeleton). Phase 3 wires the read path + schedule + IAM.
  # Phase 4 adds the snapshot/outcome writes. It never alerts (Phase 6+).
  # ===========================================================================
  ScannerFunction:
    Type: AWS::Serverless::Function
    # esbuild bundles the handler together with the imported ../shared/*.mjs
    # modules. The AWS SDK v3 ships in the nodejs22.x runtime, so it stays
    # external (not bundled) to keep the artifact small.
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.mjs
        External:
          - '@aws-sdk/*'
    Properties:
      FunctionName: gp-scanner
      CodeUri: lambdas/scanner/
      Description: Daily post-close scan — score the watchlist, snapshot, (Phase 6) alert.
      Policies:
        # Least privilege: read ONLY the specific SSM params it needs — market
        # feeds (Tiingo/Finnhub) plus narration + Telegram (Anthropic key, bot
        # token, dedicated chat id).
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TiingoKeyPath}'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${FinnhubKeyPath}'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AnthropicKeyPath}'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TelegramBotTokenPath}'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TelegramChatIdPath}'
        # Snapshots + outcomes are written (Phase 4); config + watchlist are read-only.
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable
        - DynamoDBReadPolicy:
            TableName: !Ref WatchlistTable
      Events:
        DailyScan:
          # Classic EventBridge schedule rule. Deploy-time baseline comes from the
          # ScheduleEnabled parameter (default OFF). The Phase 7 control Lambda
          # toggles this rule at runtime; a redeploy resets it to the baseline.
          Type: Schedule
          Properties:
            Name: gp-scanner-schedule
            Description: Daily post-close Gerchik-Perchik scan (toggled via Telegram).
            Schedule: !Ref ScanScheduleExpression
            Enabled: !If [ScheduleIsEnabled, true, false]

  # ===========================================================================
  # Labeler Lambda (Phase 5). Walks open signals forward, records real outcomes
  # (first-touch, pessimistic fills, after costs). Reads gp-outcomes + gp-config,
  # updates gp-outcomes. Tiingo only (no Finnhub). No alerts.
  # ===========================================================================
  LabelerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.mjs
        External:
          - '@aws-sdk/*'
    Properties:
      FunctionName: gp-labeler
      CodeUri: lambdas/labeler/
      Description: Daily outcome labeling — first-touch, pessimistic fills, after-cost P&L.
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TiingoKeyPath}'
        # Reads OPEN rows and writes labels back to gp-outcomes; config is read-only.
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable
      Events:
        DailyLabel:
          Type: Schedule
          Properties:
            Name: gp-labeler-schedule
            Description: Daily Gerchik-Perchik outcome labeling pass.
            Schedule: !Ref LabelScheduleExpression
            Enabled: !If [ScheduleIsEnabled, true, false]

  # ===========================================================================
  # Ops alarm (Phase 6). Both functions log the keyword `gp_scan_failed` on any
  # failure; a metric filter on each log group feeds a single custom metric, and
  # an alarm fires to the ops SNS topic on sustained failures. The SNS → control
  # Lambda → Telegram delivery is wired in Phase 7 (the control Lambda is the
  # subscriber); for now the topic + alarm exist and can be subscribed manually.
  # ===========================================================================
  ScannerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/gp-scanner
      RetentionInDays: 90

  LabelerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/gp-labeler
      RetentionInDays: 90

  OpsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: gp-ops-alerts
      Tags:
        - Key: Project
          Value: gerchik-perchik

  ScannerFailureFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ScannerLogGroup
      FilterPattern: gp_scan_failed
      MetricTransformations:
        - MetricNamespace: GerchikPerchik
          MetricName: ScanFailures
          MetricValue: '1'
          DefaultValue: 0

  LabelerFailureFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LabelerLogGroup
      FilterPattern: gp_scan_failed
      MetricTransformations:
        - MetricNamespace: GerchikPerchik
          MetricName: ScanFailures
          MetricValue: '1'
          DefaultValue: 0

  ScanFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: gp-scan-failures
      AlarmDescription: Sustained gp_scan_failed events from the scanner or labeler.
      Namespace: GerchikPerchik
      MetricName: ScanFailures
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

# -----------------------------------------------------------------------------
# Outputs — handy references for later phases and the seed runbook.
# -----------------------------------------------------------------------------
Outputs:
  SnapshotsTableName:
    Description: Daily score snapshots.
    Value: !Ref SnapshotsTable
  OutcomesTableName:
    Description: Signal outcomes (labeled by the Phase 5 labeler).
    Value: !Ref OutcomesTable
  ConfigTableName:
    Description: Single live tunables row (pk=CONFIG, sk=ACTIVE).
    Value: !Ref ConfigTable
  WatchlistTableName:
    Description: Scan universe (enabled rows only).
    Value: !Ref WatchlistTable
  ScannerFunctionArn:
    Description: gp-scanner Lambda ARN.
    Value: !GetAtt ScannerFunction.Arn
  LabelerFunctionArn:
    Description: gp-labeler Lambda ARN.
    Value: !GetAtt LabelerFunction.Arn
  OpsTopicArn:
    Description: SNS topic for ops alerts (Phase 7 control Lambda subscribes here).
    Value: !Ref OpsTopic
