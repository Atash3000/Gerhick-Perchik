# SAM CLI configuration. Used by `sam build` / `sam deploy`.
# NOTE: deploying creates billable AWS resources and Retain tables that survive a
# stack delete. Deploy is a deliberate, human-run step (see docs/infrastructure.md).
version = 0.1

[default.global.parameters]
stack_name = "gerchik-perchik"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
stack_name = "gerchik-perchik"
region = "us-east-1"
resolve_s3 = true
s3_prefix = "gerchik-perchik"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
tags = "Project=gerchik-perchik"
# Scanner schedule stays OFF on every deploy until the pipeline is ready
# (flip to true here, reviewed, when going to Phase 6+). See template.yaml.
#
# Telegram SSM paths are PINNED here: the Lambda code reads the dedicated
# /gerchik-perchik/telegram/* paths, and CloudFormation otherwise keeps the stale
# pre-rename parameter values (UsePreviousValue), which left the IAM role scoped to
# the old paths → AccessDenied on GetParameter. Pinning forces the IAM ARNs to
# match the code.
parameter_overrides = "ScheduleEnabled=false TelegramBotTokenPath=/gerchik-perchik/telegram/bot_token TelegramChatIdPath=/gerchik-perchik/telegram/chat_id TelegramWebhookSecretPath=/gerchik-perchik/telegram/webhook_secret"
