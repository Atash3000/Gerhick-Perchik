# SAM CLI configuration. Used by `sam build` / `sam deploy`.
# NOTE: deploying creates billable AWS resources and Retain tables that survive a
# stack delete. Deploy is a deliberate, human-run step (see docs/infrastructure.md).
version = 0.1

[default.global.parameters]
stack_name = "gerchik-perchik"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
stack_name = "gerchik-perchik"
region = "us-east-1"
resolve_s3 = true
s3_prefix = "gerchik-perchik"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
tags = "Project=gerchik-perchik"
# Pinned parameters. NOTE: cron schedules are NOT here — SAM space-splits
# parameter values and corrupts a cron string, so the crons are inlined as
# literals in template.yaml instead. Only space-free values are safe here.
# - ScheduleEnabled=true: the system is live in observe mode and meant to run, so
#   deploys no longer silently disable the schedules (runtime /stop still works
#   until the next deploy).
# - Telegram SSM paths pinned: the Lambda reads /gerchik-perchik/telegram/*, and
#   CloudFormation otherwise keeps stale pre-rename values (UsePreviousValue),
#   leaving the IAM role scoped to old paths → AccessDenied. Pinning matches code.
parameter_overrides = [
  "ScheduleEnabled=true",
  # Dedicated Gerchik-Perchik Tiingo key (issue #33). Pinning this re-scopes the
  # scanner/labeler ssm:GetParameter IAM to this ARN (template Resource follows
  # ${TiingoKeyPath}) and sets TIINGO_KEY_PATH env → KEY_PATHS → gp_keypaths log.
  # REQUIRES the human to create /gerchik/tiingo/api_key (SecureString) FIRST —
  # deploying before the param exists makes every Tiingo read fail. Finnhub +
  # Anthropic stay shared (/edge-hunter/*).
  "TiingoKeyPath=/gerchik/tiingo/api_key",
  "TelegramBotTokenPath=/gerchik-perchik/telegram/bot_token",
  "TelegramChatIdPath=/gerchik-perchik/telegram/chat_id",
  "TelegramWebhookSecretPath=/gerchik-perchik/telegram/webhook_secret",
]
